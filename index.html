<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="YU-营销案例周报 — 每周精选汽车营销与跨界营销案例，洞察营销趋势">
<title>YU-营销案例周报 | Marketing Cases Weekly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
:root{
  --bg-primary:#f8f9fc;--bg-secondary:#ffffff;--bg-tertiary:#f1f3f9;--bg-card:#ffffff;--bg-hover:#f5f6fa;
  --bg-overlay:rgba(0,0,0,.45);
  --text-primary:#1a1d2e;--text-secondary:#4a5068;--text-tertiary:#8b91a8;--text-inverse:#fff;
  --accent:#6366f1;--accent-light:#818cf8;--accent-dark:#4f46e5;--accent-bg:rgba(99,102,241,.08);
  --crossover:#ec4899;--crossover-light:#f472b6;--crossover-bg:rgba(236,72,153,.08);
  --auto:#3b82f6;--auto-light:#60a5fa;--auto-bg:rgba(59,130,246,.08);
  --success:#10b981;
  --border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.12);
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);--shadow-xl:0 24px 60px rgba(0,0,0,.16);
  --radius-sm:8px;--radius-md:12px;--radius-lg:18px;--radius-xl:24px;--radius-full:9999px;
  --gradient-hero:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  --gradient-auto:linear-gradient(135deg,#3b82f6,#6366f1);
  --gradient-crossover:linear-gradient(135deg,#ec4899,#f59e0b);
  --gradient-card-hover:linear-gradient(135deg,rgba(99,102,241,.03),rgba(236,72,153,.03));
  --nav-height:68px;--max-width:1280px;
  --transition:.3s cubic-bezier(.4,0,.2,1);--transition-fast:.15s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans SC','Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none}input{font-family:inherit}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--bg-primary)}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}

/* 导航栏 */
.navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--bg-secondary);border-bottom:1px solid var(--border);z-index:1000;transition:all var(--transition)}
.navbar.scrolled{box-shadow:var(--shadow-sm);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.85)}
.nav-container{max-width:var(--max-width);height:100%;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Inter',sans-serif;font-weight:700;font-size:18px;color:var(--text-primary);transition:opacity var(--transition-fast)}
.nav-logo:hover{opacity:.8}
.logo-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--gradient-hero);color:#fff;border-radius:10px;font-family:'Inter',sans-serif;font-weight:800;font-size:20px;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.logo-icon.small{width:28px;height:28px;font-size:16px;border-radius:8px}
.logo-text{letter-spacing:-.02em}
.logo-accent{background:var(--gradient-hero);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-left:2px}
.nav-actions{display:flex;align-items:center;gap:12px}
.week-selector{position:relative}
.week-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg-tertiary);color:var(--text-secondary);border-radius:var(--radius-full);font-size:14px;font-weight:500;transition:all var(--transition-fast)}
.week-btn:hover{background:var(--accent-bg);color:var(--accent)}
.week-dropdown{position:absolute;top:calc(100% + 8px);right:0;min-width:220px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);padding:6px;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all var(--transition);z-index:100;max-height:360px;overflow-y:auto}
.week-dropdown.show{opacity:1;visibility:visible;transform:translateY(0)}
.week-option{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);font-size:14px;color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast)}
.week-option:hover{background:var(--bg-hover);color:var(--text-primary)}
.week-option.active{background:var(--accent-bg);color:var(--accent);font-weight:600}
.week-option .week-date{font-size:12px;color:var(--text-tertiary)}

/* Hero */
.hero{position:relative;padding:calc(var(--nav-height) + 60px) 24px 48px;text-align:center;overflow:hidden}
.hero-bg{position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;overflow:hidden}
.hero-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:blob-float 20s ease-in-out infinite}
.blob-1{width:500px;height:500px;background:#6366f1;top:-150px;left:-100px}
.blob-2{width:400px;height:400px;background:#ec4899;top:-50px;right:-80px;animation-delay:-7s}
.blob-3{width:350px;height:350px;background:#3b82f6;bottom:-100px;left:40%;animation-delay:-14s}
@keyframes blob-float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-30px,40px) scale(.9)}}
.hero-content{position:relative;z-index:1;max-width:720px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-full);font-size:13px;font-weight:500;color:var(--text-secondary);box-shadow:var(--shadow-sm);margin-bottom:24px}
.pulse-dot{width:8px;height:8px;background:var(--success);border-radius:50%;position:relative}
.pulse-dot::after{content:'';position:absolute;inset:-4px;background:var(--success);border-radius:50%;opacity:.4;animation:pulse-ring 2s ease-out infinite}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:.5}100%{transform:scale(2);opacity:0}}
.hero-title{font-size:clamp(36px,6vw,56px);font-weight:900;line-height:1.15;letter-spacing:-.03em;margin-bottom:16px}
.gradient-text{background:var(--gradient-hero);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-subtitle{font-size:clamp(15px,2vw,18px);color:var(--text-secondary);margin-bottom:36px;line-height:1.7}
.hero-stats{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-full);box-shadow:var(--shadow-sm);transition:all var(--transition)}
.stat-pill:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-pill .stat-num{font-family:'Inter',sans-serif;font-size:22px;font-weight:800;line-height:1}
.stat-pill .stat-label{font-size:13px;color:var(--text-tertiary)}
.stat-pill.total .stat-num{color:var(--accent)}
.stat-pill.auto .stat-num{color:var(--auto)}
.stat-pill.crossover .stat-num{color:var(--crossover)}
.stat-divider{width:1px;height:24px;background:var(--border)}
.tab-dot{width:8px;height:8px;border-radius:50%}
.dot-auto{background:var(--auto)}.dot-crossover{background:var(--crossover)}

/* 筛选栏 */
.filter-bar{position:sticky;top:var(--nav-height);z-index:50;background:var(--bg-primary);padding:16px 24px;border-bottom:1px solid var(--border);transition:all var(--transition)}
.filter-bar.scrolled{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(248,249,252,.85);box-shadow:var(--shadow-sm)}
.filter-container{max-width:var(--max-width);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.filter-tabs{display:flex;align-items:center;gap:6px}
.filter-tab{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--radius-full);font-size:14px;font-weight:500;color:var(--text-tertiary);transition:all var(--transition-fast)}
.filter-tab:hover{color:var(--text-primary);background:var(--bg-hover)}
.filter-tab.active{background:var(--bg-secondary);color:var(--text-primary);box-shadow:var(--shadow-sm);font-weight:600}
.tab-count{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;padding:1px 7px;border-radius:var(--radius-full);background:var(--bg-tertiary);color:var(--text-tertiary);min-width:20px;text-align:center}
.filter-tab.active .tab-count{background:var(--accent);color:#fff}
.search-box{display:flex;align-items:center;gap:10px;padding:0 16px;width:280px;height:42px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-full);transition:all var(--transition-fast)}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.search-box svg{color:var(--text-tertiary);flex-shrink:0}
.search-box input{flex:1;border:none;background:none;outline:none;font-size:14px;color:var(--text-primary);min-width:0}
.search-box input::placeholder{color:var(--text-tertiary)}
.search-clear{display:none;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:var(--text-tertiary);transition:all var(--transition-fast)}
.search-clear.show{display:flex}
.search-clear:hover{background:var(--bg-hover);color:var(--text-primary)}

/* 案例区 */
.main-content{max-width:var(--max-width);margin:0 auto;padding:40px 24px;min-height:400px}
.cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
.case-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all var(--transition);display:flex;flex-direction:column;opacity:0;transform:translateY(20px);animation:card-fade-in .5s ease forwards}
@keyframes card-fade-in{to{opacity:1;transform:translateY(0)}}
.case-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:var(--border-strong);background:var(--gradient-card-hover),var(--bg-card)}
.case-image{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg-tertiary)}
.case-image img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.case-card:hover .case-image img{transform:scale(1.06)}
.case-category-tag{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--radius-full);font-size:12px;font-weight:600;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:2}
.case-category-tag.auto{background:rgba(59,130,246,.85);color:#fff}
.case-category-tag.crossover{background:rgba(236,72,153,.85);color:#fff}
.case-body{padding:20px;display:flex;flex-direction:column;flex:1;gap:10px}
.case-title{font-size:16px;font-weight:700;line-height:1.45;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color var(--transition-fast)}
.case-card:hover .case-title{color:var(--accent)}
.case-reason{font-size:13.5px;line-height:1.65;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.case-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;margin-top:auto;border-top:1px solid var(--border)}
.case-link{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent);transition:gap var(--transition-fast)}
.case-card:hover .case-link{gap:10px}
.case-id{font-family:'Inter',sans-serif;font-size:12px;color:var(--text-tertiary);font-weight:500}
.empty-state{text-align:center;padding:80px 24px;color:var(--text-tertiary)}
.empty-state svg{margin:0 auto 16px;opacity:.4}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text-secondary)}
.empty-state p{font-size:14px}

/* 历史归档 */
.archive-section{padding:48px 24px;border-top:1px solid var(--border)}
.archive-container{max-width:var(--max-width);margin:0 auto}
.archive-title{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;margin-bottom:24px;color:var(--text-primary)}
.archive-title svg{color:var(--accent)}
.archive-list{display:flex;flex-wrap:wrap;gap:10px}
.archive-item{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast)}
.archive-item:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.archive-item.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600}
.archive-item .archive-count{font-family:'Inter',sans-serif;font-size:11px;padding:2px 7px;border-radius:var(--radius-full);background:var(--bg-tertiary);color:var(--text-tertiary)}
.archive-item.active .archive-count{background:var(--accent);color:#fff}

/* 底部 */
.footer{padding:32px 24px;border-top:1px solid var(--border);background:var(--bg-secondary)}
.footer-container{max-width:var(--max-width);margin:0 auto;text-align:center}
.footer-brand{display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif;font-weight:700;font-size:16px;margin-bottom:8px;color:var(--text-primary)}
.footer-text{font-size:13px;color:var(--text-tertiary);margin-bottom:4px}
.footer-copy{font-size:12px;color:var(--text-tertiary);opacity:.7}

/* 弹窗 */
.modal-overlay{position:fixed;inset:0;background:var(--bg-overlay);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;visibility:hidden;transition:all var(--transition)}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{position:relative;max-width:680px;width:100%;max-height:85vh;background:var(--bg-secondary);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-xl);transform:scale(.9) translateY(20px);transition:transform var(--transition);display:flex;flex-direction:column}
.modal-overlay.show .modal{transform:scale(1) translateY(0)}
.modal-close{position:absolute;top:16px;right:16px;z-index:10;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;transition:all var(--transition-fast)}
.modal-close:hover{background:rgba(0,0,0,.6);transform:rotate(90deg)}
.modal-content{overflow-y:auto}
.modal-image{width:100%;aspect-ratio:16/9;background:var(--bg-tertiary);overflow:hidden}
.modal-image img{width:100%;height:100%;object-fit:cover}
.modal-body{padding:28px 32px 32px}
.modal-category{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--radius-full);font-size:12px;font-weight:600;margin-bottom:14px}
.modal-category.auto{background:var(--auto-bg);color:var(--auto)}
.modal-category.crossover{background:var(--crossover-bg);color:var(--crossover)}
.modal-title{font-size:22px;font-weight:800;line-height:1.35;margin-bottom:18px;color:var(--text-primary)}
.modal-section-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text-tertiary);margin-bottom:8px}
.modal-section-label svg{color:var(--accent)}
.modal-reason{font-size:15px;line-height:1.8;color:var(--text-secondary);margin-bottom:24px}
.modal-link-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--accent);color:#fff;border-radius:var(--radius-full);font-size:15px;font-weight:600;transition:all var(--transition-fast)}
.modal-link-btn:hover{background:var(--accent-dark);transform:translateY(-2px);box-shadow:var(--shadow-md)}

/* 返回顶部 */
.back-to-top{position:fixed;bottom:32px;right:32px;z-index:100;display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:var(--bg-secondary);border:1px solid var(--border);box-shadow:var(--shadow-md);color:var(--text-secondary);opacity:0;visibility:hidden;transform:translateY(10px);transition:all var(--transition)}
.back-to-top.show{opacity:1;visibility:visible;transform:translateY(0)}
.back-to-top:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-3px)}

/* 响应式 */
@media(max-width:768px){
  .filter-bar{padding:12px 16px}
  .filter-tabs{width:100%;justify-content:center}
  .search-box{width:100%}
  .cases-grid{grid-template-columns:1fr;gap:16px}
  .archive-section{padding:32px 16px}
  .modal{max-height:90vh;border-radius:var(--radius-lg)}
  .modal-body{padding:20px 20px 24px}
  .modal-title{font-size:18px}
  .nav-container{padding:0 16px}
  .filter-container{gap:12px}
}
@media(max-width:480px){
  .filter-tab{padding:7px 14px;font-size:13px}
  .hero-stats{gap:8px}
  .stat-pill{padding:8px 16px}
  .stat-pill .stat-num{font-size:18px}
}
</style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="#" class="nav-logo">
      <span class="logo-icon">M</span>
      <span class="logo-text">Marketing<span class="logo-accent">Weekly</span></span>
    </a>
    <div class="nav-actions">
      <div class="week-selector" id="weekSelector">
        <button class="week-btn" id="weekBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="weekLabel">本周案例</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="week-dropdown" id="weekDropdown"></div>
      </div>
    </div>
  </div>
</nav>

<!-- Hero -->
<header class="hero">
  <div class="hero-bg">
    <div class="hero-blob blob-1"></div>
    <div class="hero-blob blob-2"></div>
    <div class="hero-blob blob-3"></div>
  </div>
  <div class="hero-content">
    <div class="hero-badge">
      <span class="pulse-dot"></span>
      <span id="heroWeek">2026-W27</span> · 每周一更新
    </div>
    <h1 class="hero-title">YU-营销案例<span class="gradient-text">周报</span></h1>
    <p class="hero-subtitle">每周精选汽车营销与跨界营销案例，洞察趋势，启发创意</p>
    <div class="hero-stats" id="heroStats"></div>
  </div>
</header>

<!-- 筛选栏 -->
<section class="filter-bar" id="filterBar">
  <div class="filter-container">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all"><span class="tab-count" id="countAll">0</span>全部</button>
      <button class="filter-tab" data-filter="汽车营销"><span class="tab-dot dot-auto"></span><span class="tab-count" id="countAuto">0</span>汽车营销</button>
      <button class="filter-tab" data-filter="跨界营销"><span class="tab-dot dot-crossover"></span><span class="tab-count" id="countCrossover">0</span>跨界营销</button>
    </div>
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="搜索案例标题或推荐理由..." autocomplete="off">
      <button class="search-clear" id="searchClear"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>
</section>

<!-- 案例区 -->
<main class="main-content">
  <div class="cases-grid" id="casesGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <h3>未找到匹配的案例</h3><p>试试调整筛选条件或搜索关键词</p>

const state={DATA:null,allWeeks:[],curWeekIdx:0,filter:'all',searchQuery:''};
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);

function escapeHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function categoryToClass(c){return c==='汽车营销'?'auto':'crossover'}

  }else{
    return 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225"><defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c2d8e"/><stop offset="50%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs><rect width="400" height="225" fill="url(#cg)"/><circle cx="70" cy="50" r="70" fill="#ec4899" opacity="0.12"/><circle cx="330" cy="175" r="90" fill="#f59e0b" opacity="0.1"/><g transform="translate(200,100)" opacity="0.95"><circle cx="-22" cy="0" r="28" fill="none" stroke="white" stroke-width="2" opacity="0.9"/><circle cx="22" cy="0" r="28" fill="none" stroke="white" stroke-width="2" opacity="0.9"/><circle cx="-22" cy="0" r="28" fill="white" opacity="0.08"/><circle cx="22" cy="0" r="28" fill="white" opacity="0.08"/><circle cx="0" cy="0" r="6" fill="white" opacity="0.9"/></g><rect x="148" y="148" width="104" height="28" rx="14" fill="white" opacity="0.12"/><text x="200" y="167" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" opacity="0.8" letter-spacing="3">跨界营销</text></svg>');
  }
}

function fmtWeek(s){
  const m=s.match(/(\d{4})-(\d{2})-(\d{2})\s*~\s*(\d{4})-(\d{2})-(\d{2})/);
  if(m)return m[4]+'-'+m[5]+'-'+m[6];
  return s;
}
function fmtShort(s){
  const m=s.match(/(\d{4})-(\d{2})-(\d{2})\s*~\s*(\d{4})-(\d{2})-(\d{2})/);
  if(m)return m[4]+'-'+m[5]+'-'+m[6];
  const m2=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m2)return m2[1]+'-'+m2[2]+'-'+m2[3];
  return s;
}

function renderHero(){
  const w=state.allWeeks[state.curWeekIdx];if(!w)return;
  $('#heroWeek').textContent=fmtShort(w.week);
  const stats=w;
  $('#heroStats').innerHTML=
    '<div class="stat-pill total"><span class="stat-num">'+(stats.auto_count+stats.cross_count)+'</span><span class="stat-label">本周案例</span></div>'+
    '<div class="stat-divider"></div>'+
    '<div class="stat-pill auto"><span class="tab-dot dot-auto"></span><span class="stat-num">'+stats.auto_count+'</span><span class="stat-label">汽车营销</span></div>'+
    '<div class="stat-divider"></div>'+
    '<div class="stat-pill crossover"><span class="tab-dot dot-crossover"></span><span class="stat-num">'+stats.cross_count+'</span><span class="stat-label">跨界营销</span></div>';
}

function renderFilterCounts(){
  const w=state.allWeeks[state.curWeekIdx];if(!w)return;
  $('#countAll').textContent=w.auto_count+w.cross_count;
  $('#countAuto').textContent=w.auto_count;
  $('#countCrossover').textContent=w.cross_count;
}

function renderCases(){
  const w=state.allWeeks[state.curWeekIdx];if(!w)return;
  let cases=w.cases;
  if(state.filter!=='all')cases=cases.filter(c=>c.category===state.filter);
  if(state.searchQuery){const q=state.searchQuery.toLowerCase();cases=cases.filter(c=>(c.title&&c.title.toLowerCase().includes(q))||(c.reason&&c.reason.toLowerCase().includes(q)))}
  const grid=$('#casesGrid');const empty=$('#emptyState');
  if(cases.length===0){grid.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  grid.innerHTML=cases.map((c,i)=>{
    const cls=categoryToClass(c.category);
    const imgSrc=generatePlaceholderSVG(c.category);
    return '<article class="case-card" data-idx="'+i+'" style="animation-delay:'+(i*0.06)+'s">'+
      '<div class="case-image">'+
        '<div class="case-category-tag '+cls+'"><span class="tab-dot '+(cls==='auto'?'dot-auto':'dot-crossover')+'"></span>'+escapeHtml(c.category)+'</div>'+
        '<img src="'+imgSrc+'" alt="'+escapeHtml(c.category)+'" loading="lazy">'+
      '</div>'+
      '<div class="case-body">'+
        '<h3 class="case-title">'+escapeHtml(c.title)+'</h3>'+
        '<p class="case-reason">'+escapeHtml(c.reason)+'</p>'+
        '<div class="case-footer">'+
          '<span class="case-link">查看详情 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>'+
          '<span class="case-id">#'+String(i+1).padStart(2,'0')+'</span>'+
        '</div>'+
      '</div>'+
    '</article>';
  }).join('');
  $$('.case-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const idx=parseInt(card.dataset.idx);
      const filtered=getFilteredCases();
      if(filtered[idx])showModal(filtered[idx]);
    });
  });
}

function getFilteredCases(){
  const w=state.allWeeks[state.curWeekIdx];if(!w)return[];
  let cases=w.cases;
  if(state.filter!=='all')cases=cases.filter(c=>c.category===state.filter);
  if(state.searchQuery){const q=state.searchQuery.toLowerCase();cases=cases.filter(c=>(c.title&&c.title.toLowerCase().includes(q))||(c.reason&&c.reason.toLowerCase().includes(q)))}
  return cases;
}

function renderWeekDropdown(){
  const dd=$('#weekDropdown');
  dd.innerHTML=state.allWeeks.map((w,i)=>{
    return '<div class="week-option'+(i===state.curWeekIdx?' active':'')+'" data-idx="'+i+'"><span>第'+(state.allWeeks.length-i)+'周 · '+fmtShort(w.week)+'</span><span class="week-date">'+(w.auto_count+w.cross_count)+'条</span></div>';
  }).join('');
  dd.querySelectorAll('.week-option').forEach(opt=>{
    opt.addEventListener('click',()=>{
      state.curWeekIdx=parseInt(opt.dataset.idx);
      $('#weekDropdown').classList.remove('show');
      $('#weekLabel').textContent='第'+(state.allWeeks.length-state.curWeekIdx)+'周';
      renderAll();updateArchiveActive();
    });
  });
}

function renderArchive(){
  const list=$('#archiveList');
  list.innerHTML=state.allWeeks.map((w,i)=>{
    const total=w.auto_count+w.cross_count;
    return '<div class="archive-item'+(i===state.curWeekIdx?' active':'')+'" data-idx="'+i+'"><span>第'+(state.allWeeks.length-i)+'周 · '+fmtShort(w.week)+'</span><span class="archive-count">'+total+'</span></div>';
  }).join('');
  list.querySelectorAll('.archive-item').forEach(item=>{
    item.addEventListener('click',()=>{
      state.curWeekIdx=parseInt(item.dataset.idx);
      $('#weekLabel').textContent='第'+(state.allWeeks.length-state.curWeekIdx)+'周';
      renderAll();updateArchiveActive();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

function updateArchiveActive(){
  $$('.archive-item').forEach(item=>item.classList.toggle('active',parseInt(item.dataset.idx)===state.curWeekIdx));
  $$('.week-option').forEach(opt=>opt.classList.toggle('active',parseInt(opt.dataset.idx)===state.curWeekIdx));
}

    '</div>';
  $('#modalOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){$('#modalOverlay').classList.remove('show');document.body.style.overflow=''}

function bindEvents(){
  $('#weekBtn').addEventListener('click',e=>{e.stopPropagation();$('#weekDropdown').classList.toggle('show')});
  document.addEventListener('click',e=>{if(!e.target.closest('.week-selector'))$('#weekDropdown').classList.remove('show')});
  $$('.filter-tab').forEach(tab=>tab.addEventListener('click',()=>{
    $$('.filter-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');state.filter=tab.dataset.filter;renderCases();
  }));
  const si=$('#searchInput'),sc=$('#searchClear');
  si.addEventListener('input',e=>{state.searchQuery=e.target.value.trim();sc.classList.toggle('show',!!state.searchQuery);renderCases()});
  sc.addEventListener('click',()=>{si.value='';state.searchQuery='';sc.classList.remove('show');renderCases();si.focus()});
  $('#modalClose').addEventListener('click',closeModal);
  $('#modalOverlay').addEventListener('click',e=>{if(e.target===$('#modalOverlay'))closeModal()});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
  window.addEventListener('scroll',()=>{
    $('#navbar').classList.toggle('scrolled',scrollY>10);
    $('#filterBar').classList.toggle('scrolled',scrollY>10);
    $('#backToTop').classList.toggle('show',scrollY>400);
  });
  $('#backToTop').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
}

东君一日新同事」626 品牌日","link":"https://stock.10jqka.com.cn/20260626/c677757180.shtml","reason":"6 月 26 日吉利员工关爱日，吉利领克打破传统明星站台走流程的模式，让品牌运动大使韩东君以 “新同事” 身份完成从总部到终端门店的全流程沉浸式体验，分层制造多圈层传播素材。下午现身杭州西湖门店担任 “一日店长”，讲解领克 03、操作驾驶模拟器、交付新车、手作咖啡，每个环节都是独立可传播的内容素材，实现企业内部、线上粉丝、线下用户三个圈层的同步触达，用极低的成本产出了大量原生传播内容"},{"category":"跨界营销","title":"对“鹅腿阿姨”贴脸开大！盒马反向营销赢麻了","link":"https://m.163.com/dy/article/KVK7771F0536D9CB.html","reason":"前段时间，在北大爆火的“鹅腿阿姨”陈秀凤翻车事件令人唏嘘。一直被争相抢购的“鹅腿”被举报为“鸭腿”，被指商业欺诈。而盒马亦是精准捕捉到了这番话题情绪。应景地把自家鹅腿的文案改成了：“没有蔬菜汁，不拿同学健康开玩笑”把社交媒体的梗转化为应景的产品营销文案。句句戳中“假鹅腿”的雷点和大家的爽点。不仅为成功博得话题流量和产品销量，还顺着大众情绪打出了品牌的幽默感和活人感。"},{"category":"汽车营销","title":"争议公关——尚界Z7淋雨测试争议：六小时不漏水，这事值不值得夸？","link":"https://auto.ifeng.com/c/8uEoIOrELlQ","reason":"一台车，360度无死角被水呲了六个小时，然后品牌官方发布了一则视频，配文是“细微处越级标准，点滴间用心守护”。这个宣传视频，引来的却不全是称赞或者肯定的声音，反而也引发了一定的质疑或者争议。此次争议是‌营销叙事与大众常识的脱节‌，是工程严谨性与营销认知错位。工程上该测试确实证明了较高的密封标准，但在传播中被解读为“拿底线当亮点”，导致口碑两极分化。"},{"category":"跨界营销","title":"商场里插秧，抖音上炸锅：全国首届插秧大赛进城","link":"https://mp.weixin.qq.com/s/RZJYw_Wt2J44IGjNFDjYsg","reason":"上周末，一场“全国首届稻谷大赛”在某商场内开赛。这场活动的视频在抖音上发出后，很快引发了大量讨论。活动本身并不复杂，核心就是“反差感”——把农村的事搬到城市来做。但它触发讨论的点非常精准：城里人没种过田，没体验过那种辛苦，看到别人在商场的泥地里干活，第一反应就是“好笑”和“想吐槽”。而吐槽本身，就是传播的燃料。"},{"category":"汽车营销","title":"领克：明星身份多元化与“真实感”营销","link":"https://baijiahao.baidu.com/s?id=1869158245613602023&wfr=spider&for=pc","reason":"打破了传统的“摆拍式”明星代言，韩东君在一天内承担了“新同事”、“官号运营官”、“店长”、“咖啡师”等多重身份。活动场景从企业内部办公区（扫楼派发礼物）延伸至外部西湖门店（讲解车型、交付新车）。"},{"category":"跨界营销","title":"纽崔莱：把减重设计成闯关游戏，人人爱玩","link":"https://www.digitaling.com/projects/370887.html","reason":"现代人的两大世纪谎言：“明天一定早睡”和“今天开始减肥”。体重管理的道理大家都知道——管住嘴、迈开腿，谁不会背？但「知道重要」和「真的做到」之间，隔了整整一个太平洋。那怎么办？总不能挨个盯着用户打卡吧？享瘦营2.0的答案是：既然靠意志力不行，那就换个思路——把减重设计成一场人人愿意玩的闯关游戏"},{"category":"汽车营销","title":"小米YU7 GT：#中国汽车自动驾驶挑战纽北#","link":"https://weibo.com/2656274875/R5gP0kqOx","reason":"2026年6月22日，小米YU7 GT在德国纽博格林北环赛道以10分29秒483的成绩，创造了全球首个全程无人驾驶的官方圈速纪录，该车在完全无驾驶员、无远程人工干预的状态下，自主完成了全长20.832公里、73个弯道的测试。不仅让百年赛道首次新增了“自动驾驶”分类，也为中国智能汽车的极限验证写下了里程碑式的一笔，从追赶到领跑，从跟跑到开创，这是中国新能源汽车蓬勃向上的缩影。"},{"category":"跨界营销","title":"联想 × 麦当劳为地球再进一球","link":"https://socialbeta.com/campaign/27765","reason":"世界杯期间，联想与麦当劳联合发起「一起联麦世界杯」主题活动，此次活动理念为「为地球再进一球」，二者将携手给麦当劳那些承载着无数快乐的旧玩具塑料，带来「第次二生命」。在 2026 年 FIFA 世界杯期间，消费者前往指定麦当劳餐厅，不仅有机会获得世界杯限定开心乐园餐玩具，还可以将手头的闲置玩具投入餐厅指定的回收箱，参与超好玩的扭蛋机互动。这一次发布的「薯标」只是第一步，未来联想集团还将携手麦当劳，使用循环塑料探索绿色循环之路。"},{"category":"汽车营销","title":"王力宏成为腾势代言人 千万代言全仓比亚迪股票","link":"https://baijiahao.baidu.com/s?id=1865763558694687258&wfr=spider&for=pc","reason":"车圈首个“投资型”代言诞生，腾势汽车正式宣布，华语乐坛著名音乐人王力宏成为腾势汽车品牌全球代言人，其将出席5月18日腾势N9闪充版的上市发布会，携手共启中国新能源豪华出行全新篇章，有网友评论称“用代言费给比亚迪加杠杆”，堪称车企代言史上最硬核的“投资型代言”"},{"category":"跨界营销","title":"携程 × 成龙展现真实中国","link":"https://socialbeta.com/campaign/27788","reason":"携程官宣成龙为「中国旅游全球推广大使」，成为携程推广入境游宣传的重要角色，这个宣传片携程携手成龙用反转结构完成认知反转，呈现了中国的日常。借助成龙这样全球知名的华人明星，携程试图消解海外观众对中国的刻板印象，让世界不只看见旅游景点，更看见背后那个充满生活气息、值得亲身体验的中国"},{"category":"汽车营销","title":"优衣库新品像“丰田工服”？网友：穿上就能去4S店报到。。。","link":"https://mp.weixin.qq.com/s/blsk01SDIqr8oXzyhYlGPA","reason":"最近优衣库推出的新联名T恤，一出场就炸了全网。原因很简单：新系列成衣看着太像大厂工服，通体白色的基础款，简单到全身只有胸口有点设计，仔细一看，还是标准版丰田logo！感觉穿上都能直接去4S店上班了，全面了解此次品牌联动后发现：UNIQLO UT x Toyota系列，一共推出有四款男装/男女同款印花T恤，分别致敬了陆地巡洋舰、卡罗拉、2000GT和海狮四款丰田经典车型。"},{"category":"跨界营销","title":"马宁在线发黄牌，美团笑着就把钱赚了","link":"https://mp.weixin.qq.com/s/x0YAt5JZCg6ZFe-u27SA7g","reason":"那么为什么马宁能获得各大品牌主的青睐呢？其原因无外乎这两点：其一，稀缺的“唯一性”。在中国男足连续多届缺席世界杯的背景下，马宁作为两登世界杯的中国裁判，承载着无数球迷的情感寄托和民族自豪感，也成就了他连接世界杯和中国市场的核心人物身份。其二，专业与态度。“卡牌大师”“球场判官”“只评判动作，不讲人情世故”，这些是观众们贴在他身上的标签，也是马宁业务能力的证明。22年时间，他凭借专业的能力和体力，站上世界杯的舞台，维护着体育公平的精神，这种“匠人精神”和“久久为功”也是体育IP营销的重要组成部分。"},{"category":"汽车营销","title":"奥迪E7X 产品力创意实测-16吨车顶挤压","link":"https://baijiahao.baidu.com/s?id=1862610608608294508&wfr=spider&for=pc","reason":"一是，打破“应试”逻辑，用16吨挤压、多车随机碰撞等真实极端场景替代标准测试，以视觉冲击力将抽象安全转化为用户可感知的信任资产二是，制造“意外”话题，通过媒体“泄密”录音预设悬念，将负面转为正向关注，证明事件传播需精心设计“失控感”而非平铺直叙；三是，锚定价值本质，将安全升维为“豪华底线”，配合权威认证与量化数据，形成“事件-信任-转化”闭环"},{"category":"跨界营销","title":"伊利-对牛弹琴，创意礼包盒营销","link":"https://baijiahao.baidu.com/s?id=1845582004366370070&wfr=spider&for=pc","reason":"将“对牛弹琴”这一略带调侃的成语，转化为一个具象的、与品牌（牛）强关联的创意礼盒，以反差感制造话题和社交 "跨界营销","title":"蒙牛和海信在世界杯组上 cp了","link":"https://socialbeta.com/campaign/27714","reason":"近日，蒙牛官方发布了一组特殊的「官宣」海报，海报上同为此届 FIFA 世界杯赞助商的蒙牛和海信组起了最佳观赛 cp，致力于从「补充能量」和「展现细节」两个维度在国际赛场绽放中国风采。不仅如此，在世界杯赛场的围挡上面二者也是隔空喊话——「蒙牛海信就是牛 海信蒙牛值得信」的 slogan 双关对仗的同时巧妙互嵌品牌名，既有两个中国品牌间的惺惺相惜、相互赞赏，也像世界体现了中国品牌的自信与自豪。"},{"category":"汽车营销","title":"零跑科技创始人朱江明对话陈伟鸿，诠释“何为经典”","link":"https://weibo.com/5872290888?refer_flag=1001030103_","reason":"2026年6月16日，零跑汽车举行年度重要发布会。为强化新车在新能源时代铸就“经典”的品牌形象，官方特邀央视财经频道知名主持人‌陈伟鸿‌以视频形式对话零跑创始人朱江明，围绕零跑的‌“全域自研”技术实力‌、‌成本控制能力‌以及‌2026年冲击100万辆销量目标‌的战略底气展开。朱江明一贯强调“好而不贵”的产品哲学和制造业本质，反对盲目追逐技术泡沫，向外界传递塑造 #中国新能源车有了自己的经典款 的零跑形象"},{"category":"跨界营销","title":"小宇宙用播客打开上海国际电影节","link":"https://socialbeta.com/campaign/27747","reason":"小宇宙与第 28 届上海国际电影节联合推出播客企划「银幕亮起那一刻」。围绕「影展片单」与「观影文化」两大主轴，邀请多档播客从影展片单、影迷文化、行业观察、城市艺文体验到白玉兰奖评析，用不同视角解读本届电影节，上线「散场回响」「竞赛片特写」「场外别册」「换台时间」等多个板块，以更丰富的声音内容承接观影热度，邀请电影幕后创作者与平台播客主播，在线下产业工作坊展开跨界对谈，以声音为入口，为影展搭建起另一种陪伴式的内容现场，让电影节不止停留在影院，也进入更多人的日常片刻"},{"category":"汽车营销","title":"比亚迪智能化战略发布会PPT","link":"https://mp.weixin.qq.com/s/5xrxJxn0wpwIMq7Z0Fz39w","reason":"案例是单纯的比亚迪发布会KN展示，主要值得学习借鉴的有：整体的叙事逻辑：整个演讲从愿景+计划切入，一步步从用户痛点讲到解决方案，内容丰富且干货满满，信息密集但不乏味无聊；其次在重点技术演示环节，采用虚拟+实拍相结合的方式，把晦涩的技术原理，简单直白的展示出来。"},{"category":"跨界营销","title":"名创优品的世界杯广告全靠「抠」出来！","link":"https://socialbeta.com/campaign/27719","reason":"在大街小巷张贴的海报上，品牌并没有花大价钱聘请球星出镜，而是在海报上抠出了一个人形，欢迎各位球迷自由代入喜欢的明星，给人什么都没请却又好像谁都请了的错觉。不仅如此品牌还在西湖边 68w 的大屏上投放了一段「半成品」广告，广告满屏都是透明没有形象的球员。以上种种行为虽然让初看广告的大家摸不到头脑，却恰恰匹配了品牌「抠出请球星的预算，只为让大家的开心到账」的宣言。"},{"category":"汽车营销","title":"新乐道L60穿越极窄溶洞隧道挑战","link":"https://baijiahao.baidu.com/s?id=1867709674511945702&wfr=spider&for=pc","reason":"乐道L60这次溶洞智驾挑战，本质上是一场\"用极端场景验证智驾能力\"的硬核内容营销。选址贵州长顺县天然溶洞隧道——零光源、2.5米窄道、锋利石壁、积水碎石，天然具备\"高难度+视觉冲击\"的传播属性。让智驾在黑暗、无信号、多急弯的极限条件下穿越540米，全程只接管一次，用场景难度反衬技术可靠性。技术层面主打两个差异化点：一是高精度 激光雷达￼ 在无光环境下仍能精准探测边界，二是 蔚来世界模型￼ （NWM）不是\"看到弯踩刹车\"的反应式逻辑，而是预判式控车——提前感知弯道弧度，微调方向和速度，动作像老司机。从内容传播角度看，这类\"智驾+极境\"选题天然适合短视频——紧张感强、画面有冲击力、结果有悬念。评论区虽然有人质疑\"路线是否提前跑过\"，但整体话题度起来了，\"溶洞恐惧症被治好\"的记忆点也比较洗脑。不足是品牌植入感偏强， ategory":"跨界营销","title":"给对家打广告，名创优品只图个「开心」","link":"https://socialbeta.com/article/111087","reason":"世界微笑日名创优品打出了一套多品牌联动的方式，为其他竞争品牌打广告（包括蜜雪冰城、周大福、泡泡玛特、寿司郎等等）这种高情商夸夸的方式，可谓一举两得，一方面巧妙建立了和其他品牌的联系，用与其他大热品牌的互动获得高话题度，为品牌博的眼球。另一方面，有效传递了世界微笑日的暖心内核，让名创优品「快乐、治愈、陪伴」的品牌印象深入人心！"},{"category":"汽车营销","title":"CASETiFY × 宝马 BMW 推出全新联名系列","link":"https://socialbeta.com/campaign/27408","reason":"本次 CASETiFY 再度携手宝马 BMW 推出全新联名系列，在世界地球日到来之际，以 CASETiFY 可持续项目 Re/CASETiFY 与 BMW M3 四十周年为灵感核心，将可持续理念与汽车文化传承、先锋设计语言融入科技潮流配饰之中。这场合作不仅为消费者呈现了一场汽车文化与科技潮流的跨界盛宴，更推动了可持续时尚理念在消费电子领域的广泛传播。特别版手机壳采用来自 BMW 车辆的再生铝材打造，在细节之处延续环保理念，让汽车工业的质感与温度触手可及。"},{"category":"跨界营销","title":"星巴克 X 周杰伦「夏日范特西」品牌大使合作","link":"https://socialbeta.com/campaign/27501","reason":"星巴克中国打出了一套 \"音乐 + 咖啡\" 跨界共鸣的方式，官宣华语乐坛创作天王周杰伦成为品牌史上首位品牌大使，为咖啡行业的明星营销树立了新标杆。这种强强联合的方式，可谓一举两得，一方面巧妙建立了与华语乐坛顶级 IP 的深度联系，用周杰伦的国民度与音乐情怀获得超高话题度，为品牌博得全网关注；另一方面，有效传递了星巴克 \"探索风味、享受生活\" 的品牌内核，让星巴克「品质、创意、陪伴」的品牌印象更加深入人心！"},{"category":"汽车营销","title":"蔚来丝绸之路河西走廊段换电路线实现全线贯通","link":"https://weibo.com/5675889356/QEQGftsYQ?refer_flag=1001030103_","reason":"李斌 24 小时直播验收河西走廊换电路线的案例，是一场 **“真实性 + 价值感 + 互动性”** 的完美结合。它证明了：在信息爆炸的时代，最有效的营销是 “用事实说话”—— 放弃套路，回归本质，用 CEO 的个人信誉担保产品与服务，用真实体验打动用户，用价值传递赢得信任。这场直播为汽车行业提供了一个重要启示：CEO 是品牌最好的代言人，但代言的不是产品卖点，而是品牌价值观与用户承诺。只有将 CEO 个人形象与品牌价值深度绑定，才能在激烈的市场竞争中脱颖而出，实现品牌与销量的双重提升。"},{"category":"跨界营销","title":"沪上阿姨让「农民妈妈」们登上大屏！","link":"https://socialbeta.com/campaign/27493","reason":"这个母亲节，沪上阿姨便记录下了鲜果原产地里三位农民妈妈的工作日常，并将她们的身影投放至各大商圈的大屏，希望她们的笑容被城市看见，也希望更多人看到农民妈妈们的辛勤劳动。"},{"category":"汽车营销","title":"凯翼汽车&宜宾文旅跨界联动 5000架无人机官宣拾月max上市","link":"https://m.xinminweekly.com.cn/content/42731.html","reason":"4月28日，4万级长续航代步力作——凯翼拾月max正式上市，新车推出心愿版、如愿版两大配置版本，上市指导价分别为4.79万元、5.19万元，同步上线限时购车权益：仅需999元下定，即可解锁至高10000元惠民大礼包，诚意拉满。上市之际，凯翼汽车创新跨界，联动宜宾文旅打造专属盛宴，于五一假期期间，在宜宾三江汇流地标盛启5000架无人机“三江光影秀”，以科技光影为载体，将新车发布与城市文旅深度绑定，诚邀八方游客奔赴万里长江第一城，徜徉三江盛景、共赏梦幻光影，近距离打卡这款热门新车，解锁五一假期全新沉浸式休闲体验，让拾月max的上市热度借文旅东风持续升温。"},{"category":"跨界营销","title":"爱马仕讲述针脚、色彩和时间的故事","link":"https://socialbeta.com/campaign/27557","reason":"爱马仕「匠心工坊」巡展再次抵达中国，在上海展开全新一站。作为全球巡展的第15站，展览于 5 月 17 日至 24 日在上海展览中心对公众开放，以「邂逅匠艺现场」为主题，邀请观众走近爱马仕创作的核心。"},{"category":"汽车营销","title":"问界M6趣往生活每一处·车主交付仪式杭州站落幕","link":"http://www.kjjrw.com.cn/system/2026/05/06/015454141.shtml","reason":"问界M6于2026年5月初在杭州打造了一场别开生面的“快闪+交付”活动，其核心创新在于颠覆了传统4S店交付的低调模式，将新车交付仪式搬上街头公共空间。活动以“灵感橱窗”艺术装置为核心，将实车展示与潮流互动融为一体，成功吸引了大量自然流量，并将白天积攒的街头人气在傍晚全部聚焦于车主身上，让每一位车主的交付瞬间都演变为被镜头记录和路人围观的公共事件。通过将交付流程升级为仪式感极强的“开箱时刻”与高光定格，问界M6不仅精准传递了其“通透、开放、不设限”的产品气质，更成功赋予车主强烈的专属感和品牌认同感。"},{"category":"跨界营销","title":"二手车行业首例品牌跨界落地，瓜子二手车牵手三胖蛋","link":"https://www.cnr.cn/mspd/zhsh/20260428/t20260428_527603188.shtml","reason":"瓜子二手车联手知名瓜子品牌“三胖蛋”，巧妙利用“瓜子”这一同名符号，推出名为“双享车载罐”的联名产品。该产品将瓜子的休闲零食属性与瓜子二手车的车内消费场景自然结合，既强化了“瓜子”品牌的记忆点，又通过“卖车与嗑瓜子”的场景融合，传递出轻松、愉悦的交易体验。这次跨界的核心策略，是将品牌符号从交易场景延伸至生活场景，从而在竞争激烈的二手车市场中打造差异化认知，并借助高频消费的零食为低频的汽车交易注入日常触达机会。"},{"category":"汽车营销","title":"腾势汽车王力宏X腾势，顶流与顶豪双向奔赴，中国品牌高端化新范式","link":"https://news.yiche.com/hao/wenzhang/109958109/","reason":"5月15日，腾势汽车正式官宣华语乐坛殿堂级艺术家王力宏成为品牌全球代言人，这一消息瞬间引爆全网。品牌全球代言人官宣，并出席5月18日的N9闪充版上市发布会。双方开展了长达三个月的深度考察，旨在实现艺术与科技的“双向奔赴”。"},{"category":"跨界营销","title":"淘宝淘宝「盘淘会」，品牌庆生，最「神」的一集出现了！","link":"https://mp.weixin.qq.com/s/cu__ZMhETm0rh6WEAEiiPw","reason":"每年的 5 月 10 日，是淘宝的生日。今年一举玩到了神仙界，原地变身「淘王母」，广邀各路淘内「神仙」，什么百花仙子、招财猫、毗蓝婆菩萨、原薯天尊、托糖天王……给自己办了场声势浩大的天庭生日宴，不仅梗含量依旧超标，还由此掀起了一场全网同频庆生的狂欢。品牌纷纷官宣定制的神仙人设：猫天天黑皮「招财猫」、现出原形的双汇「天蓬元帅」、仙气飘飘的螺霸王「大螺金仙」.......淘宝同步完成了一次精细化升级，围绕「1个核心事件 + 多维内容共创 + 破圈传播」的策略路径，打通平台内外声量。"},{"category":"汽车营销","title":"小鹏汽车 GX我为朋友们造了这台车","link":"https://weibo.com/2455476364/QF8oKo7f0?pagetype=profilefeed","reason":"小鹏汽车最新推出的全尺寸旗舰SUV——小鹏GX，被定位为小鹏集团科技集大成之作。何小鹏在北京组织了一场私人聚会，邀请姚劲波、周鸿祎、王小川、王高飞、田溯宁、朱顺炎等科技与商业界重量级人物品鉴小鹏GX。小鹏GX不仅是产品，更是何小鹏献给所有“为自己也为时代在折腾的人”的礼物"},{"category":"跨界营销","title":"沪上阿姨让「农民妈妈」们登上大屏","link":"https://socialbeta.com/campaign/27493","reason":"母亲节，沪上阿姨将镜头对准了鲜果原产地里的农民妈妈，记录下了西双版纳种西瓜的钟阿旭、江门采香水柠檬的伍桥娣、建水摘葡萄的康艳茹三位女性种植者的工作日常，并把她们的身影投放至城市商圈大屏，用「此母手中鲜」系列海报，串联起母亲节的情感表达与原产地的产品特性展示，让产品与人物之间建立起自然具体的连接"},{"category":"汽车营销","title
