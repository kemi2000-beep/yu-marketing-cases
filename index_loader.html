<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>YU-营销案例库</title>
<style>body{margin:0;background:#f8f9fc}#app{width:100%;min-height:100vh}</style>
</head><body>
<div id="app">加载中...</div>
<script>
fetch('https://cdn.jsdelivr.net/gh/kemi2000-beep/yu-marketing-cases@main/index_full.html')
.then(r=>r.text())
.then(html=>{
  document.open();
  document.write(html);
  document.close();
})
.catch(e=>{
  document.getElementById('app').innerHTML='<p style="text-align:center;padding:40px;color:#999">数据加载失败，请刷新重试</p>';
});
</script>
</body></html>
